name: Build & Release Single-File HTML

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          else
            PREVIOUS_TAG=""
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES="$(git log "${PREVIOUS_TAG}..HEAD" --no-merges --date=format:'%Y-%m-%d' --pretty=format:'- `%h` %ad %s')"
          else
            CHANGES="$(git log -n 10 --no-merges --date=format:'%Y-%m-%d' --pretty=format:'- `%h` %ad %s')"
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES='- 无新增提交记录'
          fi

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build single-file app
        run: npm run build:single
        env:
          APP_VERSION: ${{ steps.version.outputs.tag }}

      - name: Rename artifact
        run: mv dist/index.html dist/gongwen.html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 公文排版工具 ${{ steps.version.outputs.tag }}
          body: |
            ## 离线单文件版本

            下载 `gongwen.html`，双击即可在浏览器中离线使用。

            - 构建日期：${{ steps.version.outputs.date }}
            - 提交：${{ github.sha }}

            ## 本次更新

            ${{ steps.notes.outputs.changes }}
          files: dist/gongwen.html
